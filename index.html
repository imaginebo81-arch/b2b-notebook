<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manjushree Notebook Manufactures | Wholesale Stationery</title>
    <meta name="description" content="Manjushree Notebook Manufactures is your trusted partner for high-quality notebooks and wholesale stationery. We specialize in bulk orders with guaranteed customer satisfaction." />
    <meta name="keywords" content="notebooks, stationery, wholesale, bulk order notebooks, Manjushree Notebook Manufactures, Assam notebooks, high quality notebooks, school notebooks, stitched notebooks, spiral notebooks" />
    <meta name="author" content="Manjushree Notebook Manufactures" />
    <meta property="og:title" content="Manjushree Notebook Manufactures | Wholesale Stationery" />
    <meta property="og:description" content="Quality Note Book Creator's. Wholesale Stationery and Notebooks available for bulk orders at the best prices." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://manjushreenotebooks.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manjushree Notebook Manufactures" />
    <meta name="twitter:description" content="Quality Note Book Creator's. Wholesale Stationery and Notebooks available for bulk orders." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><g transform='translate(6, 4)'><rect x='0' y='2' width='6' height='20' rx='1' fill='%23f97316' transform='rotate(-12 3 12)' /><rect x='6' y='0' width='6' height='20' rx='1' fill='%233b82f6' transform='rotate(-6 9 10)' /><rect x='12' y='0' width='6' height='20' rx='1' fill='%23ef4444' /></g></svg>" />
    <style>
      .watermark {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        align-items: center;
        background-color: #121212;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 0;
        text-decoration: none;
        color: white;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        transition:
          transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
          background-color 0.2s ease;
        z-index: 9999;
        overflow: hidden;
      }
      .watermark:hover {
        background-color: #1a1a1a;
        transform: translateY(-2px);
      }
      .watermark-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        text-decoration: none;
        color: inherit;
        border-right: 1px solid #2a2a2a;
      }
      .watermark-text-light {
        color: #9ca3af;
        font-weight: 400;
      }
      .watermark-text-bold {
        color: #ffffff;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .watermark-logo {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
      }
      .watermark-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .watermark-close {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        height: 40px;
        color: #4b5563;
        cursor: pointer;
        transition:
          color 0.2s ease,
          background-color 0.2s ease;
      }
      .watermark-close:hover {
        color: #ffffff;
        background-color: #262626;
      }
      @media (max-width: 480px) {
        .watermark {
          bottom: 16px;
          right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Imagine.bo Watermark -->
    <div id="watermark" class="watermark">
      <a
        href="https://imagine.bo"
        target="_blank"
        rel="noopener noreferrer"
        class="watermark-link"
      >
        <span class="watermark-text-light">Built with</span>
        <div class="watermark-logo">
          <img src="/ImagineboIcon.svg" alt="Imagine.bo" />
        </div>
        <span class="watermark-text-bold">Imagine.bo</span>
      </a>
      <div
        class="watermark-close"
        onclick="document.getElementById('watermark').style.display = 'none'"
      >
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
